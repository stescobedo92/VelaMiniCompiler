name: Documentation

on:
  pull_request:
    paths:
      - '.github/workflows/docs.yml'
      - 'docs/**'
      - 'eng/docs/**'
      - 'VERSION'
      - 'CHANGELOG.md'
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/docs.yml'
      - 'docs/**'
      - 'eng/docs/**'
      - 'VERSION'
      - 'CHANGELOG.md'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Mintlify docs
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate docs.json and links
        working-directory: docs
        run: npx --yes mint@latest broken-links

  pages:
    name: Deploy official docs to GitHub Pages
    if: github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build official static documentation site
        working-directory: eng/docs
        run: |
          npm install
          node build-pages.mjs

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site

      - id: deployment
        name: Deploy documentation
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
