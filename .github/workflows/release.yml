name: Release compiler

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in X.Y.Z or vX.Y.Z format"
        required: true
        type: string
      sign:
        description: "Sign artifacts. Required when publishing a release."
        required: true
        default: false
        type: boolean
      publish:
        description: "Create a GitHub Release. Requires signing."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  prepare:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      sign: ${{ steps.release.outputs.sign }}
      publish: ${{ steps.release.outputs.publish }}
    steps:
      - id: release
        name: Validate version and release mode
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SIGN: ${{ inputs.sign }}
          INPUT_PUBLISH: ${{ inputs.publish }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "push" ]]; then
            version="$REF_NAME"
            version="${version#v}"
            sign=true
            publish=true
          else
            version="$INPUT_VERSION"
            version="${version#v}"
            sign="$INPUT_SIGN"
            publish="$INPUT_PUBLISH"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version '$version' must use X.Y.Z format." >&2
            exit 1
          fi

          if [[ "$publish" == "true" && "$sign" != "true" ]]; then
            echo "Publishing an unsigned release is forbidden." >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "tag=v$version"
            echo "sign=$sign"
            echo "publish=$publish"
          } >> "$GITHUB_OUTPUT"

  windows:
    name: Windows x64
    needs: prepare
    runs-on: windows-2022
    environment: release
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      PUBLISH: .release\publish
      DIST: .release\dist
      WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Native AOT compiler
        shell: pwsh
        run: |
          dotnet publish .\src\Vela.Cli\Vela.Cli.csproj --configuration Release --runtime win-x64 --self-contained true "-p:PublishAot=true" "-p:StripSymbols=true" "-p:Version=$env:VERSION" --output $env:PUBLISH
          Move-Item "$env:PUBLISH\Vela.Cli.exe" "$env:PUBLISH\vela.exe"

      - name: Sign compiler binary
        if: needs.prepare.outputs.sign == 'true'
        shell: pwsh
        run: .\eng\release\windows\sign.ps1 -Paths "$env:PUBLISH\vela.exe"

      - name: Install WiX Toolset
        shell: pwsh
        run: choco install wixtoolset --version=3.11.2 --yes --no-progress

      - name: Build MSI package
        shell: pwsh
        run: .\eng\release\windows\build-msi.ps1 -Version $env:VERSION -PublishDirectory $env:PUBLISH -OutputDirectory $env:DIST

      - name: Sign MSI package
        if: needs.prepare.outputs.sign == 'true'
        shell: pwsh
        run: .\eng\release\windows\sign.ps1 -Paths "$env:DIST\vela-$env:VERSION-win-x64.msi"

      - name: Build graphical setup wizard
        shell: pwsh
        run: .\eng\release\windows\build-bundle.ps1 -Version $env:VERSION -MsiPath "$env:DIST\vela-$env:VERSION-win-x64.msi" -OutputDirectory $env:DIST

      - name: Sign setup wizard
        if: needs.prepare.outputs.sign == 'true'
        shell: pwsh
        run: .\eng\release\windows\sign.ps1 -Paths "$env:DIST\vela-$env:VERSION-win-x64-setup.exe"

      - name: Stage standalone compiler
        shell: pwsh
        run: |
          Copy-Item "$env:PUBLISH\vela.exe" "$env:DIST\vela-$env:VERSION-win-x64.exe"
          "DIRECT_ARTIFACT=$env:DIST\vela-$env:VERSION-win-x64.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Attest compiler provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.DIRECT_ARTIFACT }}

      - name: Upload Windows distribution
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x64
          if-no-files-found: error
          path: ${{ env.DIST }}\*

  macos:
    name: macOS ${{ matrix.architecture }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    environment: release
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            runtime: osx-x64
            architecture: x64
          - runner: macos-14
            runtime: osx-arm64
            architecture: arm64
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      PUBLISH: .release/publish
      DIST: .release/dist
      MACOS_APPLICATION_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_APPLICATION_CERTIFICATE_P12_BASE64 }}
      MACOS_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_APPLICATION_CERTIFICATE_PASSWORD }}
      MACOS_INSTALLER_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_P12_BASE64 }}
      MACOS_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PASSWORD }}
      MACOS_APPLICATION_IDENTITY: ${{ secrets.MACOS_APPLICATION_IDENTITY }}
      MACOS_INSTALLER_IDENTITY: ${{ secrets.MACOS_INSTALLER_IDENTITY }}
      MACOS_KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
      APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Native AOT compiler
        shell: bash
        run: |
          dotnet publish src/Vela.Cli/Vela.Cli.csproj \
            --configuration Release \
            --runtime "${{ matrix.runtime }}" \
            --self-contained true \
            -p:PublishAot=true \
            -p:StripSymbols=true \
            -p:Version="$VERSION" \
            --output "$PUBLISH"
          mv "$PUBLISH/Vela.Cli" "$PUBLISH/vela"

      - name: Import signing certificates
        if: needs.prepare.outputs.sign == 'true'
        shell: bash
        run: ./eng/release/macos/prepare-signing.sh

      - name: Sign compiler binary
        if: needs.prepare.outputs.sign == 'true'
        shell: bash
        run: ./eng/release/macos/sign-binary.sh "$PUBLISH/vela"

      - name: Build PKG installer
        shell: bash
        run: ./eng/release/macos/build-package.sh "$VERSION" "${{ matrix.architecture }}" "$PUBLISH" "$DIST"

      - name: Sign PKG installer
        if: needs.prepare.outputs.sign == 'true'
        shell: bash
        run: ./eng/release/macos/sign-package.sh "$DIST/vela-$VERSION-macos-${{ matrix.architecture }}.pkg"

      - name: Notarize PKG installer
        if: needs.prepare.outputs.sign == 'true'
        shell: bash
        run: ./eng/release/macos/notarize.sh "$DIST/vela-$VERSION-macos-${{ matrix.architecture }}.pkg"

      - name: Build DMG installer image
        shell: bash
        run: ./eng/release/macos/build-dmg.sh "$DIST/vela-$VERSION-macos-${{ matrix.architecture }}.pkg" "$DIST"

      - name: Sign and notarize DMG installer image
        if: needs.prepare.outputs.sign == 'true'
        shell: bash
        run: |
          ./eng/release/macos/sign-dmg.sh "$DIST/vela-$VERSION-macos-${{ matrix.architecture }}.dmg"
          ./eng/release/macos/notarize.sh "$DIST/vela-$VERSION-macos-${{ matrix.architecture }}.dmg"

      - name: Stage standalone compiler
        shell: bash
        run: |
          cp "$PUBLISH/vela" "$DIST/vela-$VERSION-macos-${{ matrix.architecture }}"
          echo "DIRECT_ARTIFACT=$DIST/vela-$VERSION-macos-${{ matrix.architecture }}" >> "$GITHUB_ENV"

      - name: Attest compiler provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.DIRECT_ARTIFACT }}

      - name: Upload macOS distribution
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ matrix.architecture }}
          if-no-files-found: error
          path: ${{ env.DIST }}/*

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - windows
      - macos
      - linux
    if: needs.prepare.outputs.publish == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release

      - name: Generate checksums
        shell: bash
        run: |
          cd release
          sha256sum * > SHA256SUMS

      - name: Create GitHub Release
        shell: bash
        run: |
          gh release create "$TAG" release/* \
            --verify-tag \
            --title "Vela $VERSION" \
            --generate-notes

  linux:
    name: Linux x64
    needs: prepare
    runs-on: ubuntu-22.04
    environment: release
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      PUBLISH: .release/publish
      DIST: .release/dist
      LINUX_GPG_PRIVATE_KEY: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
      LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}
      LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install packaging tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes rpm
          sudo gem install fpm --no-document

      - name: Publish Native AOT compiler
        shell: bash
        run: |
          dotnet publish src/Vela.Cli/Vela.Cli.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --self-contained true \
            -p:PublishAot=true \
            -p:StripSymbols=true \
            -p:Version="$VERSION" \
            --output "$PUBLISH"
          mv "$PUBLISH/Vela.Cli" "$PUBLISH/vela"

      - name: Build DEB and RPM packages
        shell: bash
        run: ./eng/release/linux/build-packages.sh "$VERSION" "$PUBLISH" "$DIST"

      - name: Stage standalone compiler
        shell: bash
        run: |
          install -D -m 0755 "$PUBLISH/vela" "$DIST/vela-$VERSION-linux-x64"
          echo "DIRECT_ARTIFACT=$DIST/vela-$VERSION-linux-x64" >> "$GITHUB_ENV"

      - name: Sign Linux artifacts
        if: needs.prepare.outputs.sign == 'true'
        shell: bash
        run: ./eng/release/linux/sign-artifacts.sh "$DIRECT_ARTIFACT" "$DIST/vela_${VERSION}_amd64.deb" "$DIST/vela-$VERSION-1.x86_64.rpm"

      - name: Attest compiler provenance
        uses: actions/attest@v4
        with:
          subject-path: ${{ env.DIRECT_ARTIFACT }}

      - name: Upload Linux distribution
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x64
          if-no-files-found: error
          path: ${{ env.DIST }}/*
